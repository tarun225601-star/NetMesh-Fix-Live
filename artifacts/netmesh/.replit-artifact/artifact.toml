kind = "web"
previewPath = "/"
title = "NetMesh"
version = "1.0.0"
id = "artifacts/netmesh"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23418

[services.development]
run = "pnpm --filter @workspace/netmesh run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/netmesh", "run", "build" ]
serve = "static"
publicDir = "artifacts/netmesh/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23418"
BASE_PATH = "/"

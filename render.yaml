# render.yaml — NetMesh Render Blueprint
# ─────────────────────────────────────────────────────────────────────────────
# Deploys the NetMesh React/Vite frontend as a Render Static Site.
# Static Sites are 100% free on Render — no card required.
#
# The Express API server is excluded here because Node.js Web Services require
# payment details on Render even on the free tier. The frontend is fully
# self-contained with simulated data and works without the backend.
#
# Usage: Render Dashboard → New → Blueprint → select this repo.
# ─────────────────────────────────────────────────────────────────────────────

services:
  - type: web
    name: netmesh
    runtime: static

    # pnpm is not pre-installed on Render; bootstrap it first, then build only
    # the netmesh workspace package via the pnpm filter flag.
    buildCommand: sh build.sh

    staticPublishPath: ./artifacts/netmesh/dist/public

    # SPA catch-all: every path that doesn't match a real file gets index.html
    # so wouter can handle client-side routing (hard refreshes, direct links).
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

    envVars:
      - key: NODE_VERSION
        value: "24"
      - key: NODE_ENV
        value: production
      # vite.config.ts validates PORT at config-load time even during `vite build`.
      # 3000 is a placeholder — the static site never opens a port.
      - key: PORT
        value: "3000"
      # "/" means the app is served at the root domain with no sub-path prefix.
      - key: BASE_PATH
        value: "/"

# render.yaml — NetMesh Render Blueprint
# ─────────────────────────────────────────────────────────────────────────────
# Deploys the full NetMesh stack as a single Render Web Service:
#   • Express API server  — REST + WebSocket signaling (/api/*)
#   • Vite/React frontend — served as static files from the same process (/)
#
# Usage: Render Dashboard → New → Blueprint → select this repo.
# ─────────────────────────────────────────────────────────────────────────────

services:
  - type: web
    name: netmesh
    runtime: node

    # build.sh: installs deps via `npx pnpm` (no global-bin permissions
    # required), builds the Vite frontend, then bundles the Express server.
    # It verifies both build outputs exist before exiting successfully.
    buildCommand: sh build.sh

    # Start the bundled Express server via the root entry point.
    # It serves both the API routes (/api/*) and the React SPA (/*).
    startCommand: node server.js

    envVars:
      - key: NODE_VERSION
        value: "24"
      - key: NODE_ENV
        value: production
      # Render assigns the real port at runtime via the PORT env var.
      # The Express server reads process.env.PORT to bind on the correct port.
      - key: PORT
        value: "10000"
      # Cryptographically random secret for session signing.
      # "generateValue: true" makes Render create it automatically on first deploy.
      - key: SESSION_SECRET
        generateValue: true
